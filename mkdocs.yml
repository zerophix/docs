# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 海豚思维笔记 · Quant Wiki
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

site_name: 海豚思维笔记
site_description: 个人量化知识库 · 中文百科 · 技术文档
site_author: mingxilv
site_url: https://mingxilv.github.io/dolphinmind/

# Repository
repo_name: mingxilv/dolphinmind
repo_url: https://github.com/mingxilv/dolphinmind
edit_uri: edit/master/docs/

# Copyright
copyright: Copyright &copy; 2026 mingxilv

# ── Theme ──
theme:
  name: material

  # 自定义 Logo（可选，放在 docs/assets/images/logo.svg）
  # logo: assets/images/logo.svg

  # 语言
  language: zh

  # 特性
  features:
    # 导航
    - navigation.tabs            # 顶部一级横向导航
    - navigation.tabs.sticky     # 固定顶部导航（滚动时保持可见）
    - navigation.sections        # 侧边栏显示章节分组
    - navigation.expand          # 默认展开侧边栏
    - navigation.top             # 回到顶部按钮
    - navigation.indexes         # 将 section 的 index.md 作为导航文案
    - navigation.tracking        # 滚动时高亮对应导航条目

    # 内容
    - content.code.copy          # 代码块复制按钮
    - content.code.annotate      # 代码行注释
    - content.tabs.link          # 标签页 URL 同步
    - content.action.edit        # 编辑按钮（跳转 GitHub）

    # 搜索
    - search.highlight           # 搜索结果高亮
    - search.suggest             # 搜索建议
    - search.share               # 分享搜索结果

    # 页眉
    - header.autohide            # 滚动时自动隐藏顶部栏

    # 锚点
    - toc.follow                 # 滚动时右侧 TOC 自动跟随高亮

  # 配色方案
  palette:
    # 亮色模式
    - scheme: default
      primary: indigo            # 靛蓝 #3F51B5
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换暗色模式

    # 暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式

  # 字体
  font:
    text: Noto Sans SC           # 中文正文
    code: JetBrains Mono         # 等宽代码字体

  # 图标
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/light-bulb-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

# ── Plugins ──
plugins:
  - search:
      lang:
        - zh
        - en
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true

# ── Extensions ──
markdown_extensions:
  # 代码高亮
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

  # 数学公式
  - pymdownx.arithmatex:
      generic: true

  # 选项卡
  - pymdownx.tabbed:
      alternate_style: true

  # 表情
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # 折叠 / 警告框
  - admonition
  - pymdownx.details

  # 目录
  - toc:
      permalink: true
      permalink_title: 锚点链接
      toc_depth: 3

  # 其他
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.betterem:
      smart_enable: all
  - attr_list
  - md_in_html
  - def_list
  - tables

# ── Extra ──
extra:
  # 社交链接
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mingxilv
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/mingxilv

  # 同意声明
  consent:
    title: Cookie 声明
    description: >-
      本站使用 Google Analytics 分析流量。你可以接受或拒绝。

  # 版本号（用于页面底部）
  version:
    provider: mike

# ── Extra CSS ──
extra_css:
  - assets/stylesheets/custom.css

# ── Extra JavaScript ──
extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# ── Navigation (自动导航) ──
# 由 awesome-pages 插件通过 .pages 文件管理
# 添加/删除 .md 文档后无需修改此文件
nav:
  - 首页: index.md
  - ... | concepts/
  - ... | tutorials/
  - ... | frontier/
  - ... | ai/
  - MCP 工作流: mcp-workflow.md
