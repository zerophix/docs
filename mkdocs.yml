# ── Theme ──
theme:
  name: material
  language: zh

  features:
    - navigation.top             # 回到顶部
    - navigation.tracking        # 滚动高亮当前页面
    - content.code.copy          # 代码块复制
    - content.code.annotate      # 代码行注释
    - search.highlight           # 搜索高亮
    - search.suggest             # 搜索建议
    - toc.follow                 # 右侧目录跟随

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式

  font:
    text: Noto Sans SC
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

# ── Plugins ──
plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true

# ── Extensions ──
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.betterem:
      smart_enable: all
  - attr_list
  - md_in_html
  - def_list
  - tables

# ── Extra ──
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zerophix

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
