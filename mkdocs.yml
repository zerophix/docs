# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 思维笔记 — MkDocs 配置（Material 主题优化）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

site_name: "思维笔记"
site_description: "个人知识沉淀 · AI 协作开发笔记"
site_author: "zerophix"
site_url: "https://zerophix.github.io/docs/"

# Repository
repo_name: "zerophix/docs"
repo_url: "https://github.com/zerophix/docs"
edit_uri: "edit/master/docs/"

# Copyright
copyright: "Copyright &copy; 2026 zerophix"

# ── Navigation ──
nav:
  - 首页: index.md
  - 知识地图: map/README.md
  - 领域知识:
    - AI 开发: domain/ai/README.md
    - 工程实践: domain/engineering/README.md
    - 量化金融: domain/quant/README.md
  - 灵感碎片: peek/README.md
  - 学习日志: log/README.md
  - 深度沉淀: deep/README.md
  - 技能库: skills/README.md
  - 文档规范: DOC-GUIDE.md
  - 指南:
    - 部署指南: guide/deployment.md
  - MCP 工作流: mcp-workflow.md
  - 归档: archive/index.md

# ── Theme: Material for MkDocs ──
theme:
  name: material
  language: zh

  # 调色板：默认暗色（Slate），支持切换
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
    - scheme: default
      primary: indigo
      accent: blue
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式

  # 界面高级特性（三栏布局 + 搜索 + 代码复制）
  features:
    - navigation.tabs            # 顶部标签栏
    - navigation.sections        # 侧边栏分组显示
    - navigation.expand          # 默认展开侧边栏
    - navigation.top             # 返回顶部按钮
    - search.suggest             # 搜索建议
    - search.highlight           # 搜索高亮
    - content.code.copy          # 代码块复制按钮
    - content.code.annotate      # 代码行注释
    - toc.follow                 # 右侧目录跟随滚动

  # 字体
  font:
    text: "Noto Sans SC"
    code: "JetBrains Mono"

  # 图标
  icon:
    repo: "fontawesome/brands/github"

# ── Plugins ──
plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      timezone: "Asia/Shanghai"
      locale: "zh-CN"
  - minify:
      minify_html: true

# ── Markdown Extensions ──
markdown_extensions:
  - def_list
  - tables

  # 代码高亮
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # 文本增强
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # admonition 与 details（折叠块）
  - admonition
  - pymdownx.details

  # 目录
  - toc:
      permalink: true
      toc_depth: 3

  # 更多扩展
  - attr_list
  - md_in_html
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.betterem:
      smart_enable: all

# ── Extra ──
extra:
  social:
    - icon: "fontawesome/brands/github"
      link: "https://github.com/zerophix"
  generator: false

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - assets/javascripts/mathjax.js
