# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 思维笔记 — MkDocs 配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

site_name: "思维笔记"
site_description: "个人知识沉淀 · AI 协作开发笔记"
site_author: zerophix
site_url: https://zerophix.github.io/docs/

# Repository
repo_name: zerophix/docs
repo_url: https://github.com/zerophix/docs
edit_uri: edit/master/docs/

# Copyright
copyright: Copyright &copy; 2026 zerophix

# ── Navigation ──
nav:
  - 首页: index.md
  - 知识地图: map/README.md
  - 时间线: chrono/README.md
  - 领域知识:
    - AI 开发: domain/ai/README.md
    - 工程实践: domain/engineering/README.md
    - 量化金融: domain/quant/README.md
  - 灵感碎片: peek/README.md
  - 学习日志: log/README.md
  - 深度沉淀: deep/README.md
  - 技能库: skills/README.md
  - 指南:
    - 贡献指南: guide/README.md
    - 命名规范: guide/conventions.md
    - 部署指南: guide/deployment.md
  - MCP 工作流: mcp-workflow.md

# ── Theme ──
theme:
  name: material
  language: zh

  features:
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式

  font:
    text: Noto Sans SC
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

# ── Plugins ──
plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false
  - minify:
      minify_html: true

# ── Extensions ──
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.betterem:
      smart_enable: all
  - attr_list
  - md_in_html
  - def_list
  - tables

# ── Extra ──
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zerophix

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
